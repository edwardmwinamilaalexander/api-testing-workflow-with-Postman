name: Postman API Tests

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      COLLECTION_ID: "<your-collection-id>"
      ENVIRONMENT_ID: "<your-environment-id>"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Authenticate Postman CLI
        run: postman login --with-api-key $POSTMAN_API_KEY

      - name: Download latest Postman collection
        run: |
          curl -X GET "https://api.getpostman.com/collections/$COLLECTION_ID" \
          -H "X-Api-Key: $POSTMAN_API_KEY" \
          -o collection.json

      - name: Download latest Postman environment
        run: |
          curl -X GET "https://api.getpostman.com/environments/$ENVIRONMENT_ID" \
          -H "X-Api-Key: $POSTMAN_API_KEY" \
          -o environment.json

      - name: Run Postman Collection
        run: |
          postman collection run "collection.json" \
            -e "environment.json" \
            --reporters cli,html \
            --reporter-html-export "postman-report.html"

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: postman-html-report
          path: postman-report.html

